<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Subway Surfers</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d0f22" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Subway Surfers" />
    <link rel="apple-touch-icon" href="/icon-512.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('PWA ServiceWorker registered successfully:', reg.scope);
              
              // Programmatically seed cache with all currently loaded scripts, styles, fonts, and assets!
              // This is a 100% bulletproof solution for offline gameplay without needing hardcoded file lists.
              if ('caches' in window) {
                // Wait 1.5 seconds for all dynamic elements (like 3D engine scripts and models) to finish loading
                setTimeout(() => {
                  caches.open('subway-surfers-3d-v1').then((cache) => {
                    const resourceEntries = performance.getEntriesByType('resource');
                    const urlsToCache = resourceEntries
                      .map(entry => entry.name)
                      .filter(url => {
                        // Only cache local origin files and Google fonts
                        const isLocal = url.startsWith(window.location.origin);
                        const isFont = url.includes('fonts.googleapis.com') || url.includes('fonts.gstatic.com');
                        const isSymmetric = !url.includes('/@vite/') && !url.includes('/@react-refresh') && !url.includes('hot-update');
                        return (isLocal || isFont) && isSymmetric;
                      });

                    // Add main document and manifest
                    const finalUrls = Array.from(new Set([
                      window.location.origin + '/',
                      window.location.origin + '/index.html',
                      window.location.origin + '/manifest.json',
                      window.location.origin + '/icon-512.jpg',
                      ...urlsToCache
                    ]));

                    Promise.all(
                      finalUrls.map(url => {
                        return cache.add(url)
                          .then(() => console.log('Successfully cached resource:', url))
                          .catch(err => console.debug('Skipped caching for:', url, err));
                      })
                    ).then(() => {
                      console.log('PWA Offline Cache priming complete!');
                    });
                  });
                }, 1500);
              }
            })
            .catch((err) => {
              console.warn('PWA ServiceWorker registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
